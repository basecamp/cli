version: "2"

formatters:
  enable:
    - gofmt

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - gocritic
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
    errcheck:
      check-blank: false
    misspell:
      locale: US

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
